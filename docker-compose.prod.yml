version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: b2b_distributor_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-b2b_distributor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: b2b_distributor_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-b2b_distributor}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      PORT: 5000
      NODE_ENV: production
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: b2b_distributor_frontend
    restart: always
    depends_on:
      - backend

  proxy:
    image: nginx:alpine
    container_name: b2b_distributor_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  certbot_certs:
  certbot_www:
