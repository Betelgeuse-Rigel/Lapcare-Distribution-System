stages:
  - deploy

deploy_to_production:
  stage: deploy
  image: alpine:latest
  only:
    - main
  before_script:
    - apk add --no-cache openssh-client git
    - eval $(ssh-agent -s)
    - echo "$EC2_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan -H 3.7.123.18 >> ~/.ssh/known_hosts
  script:
    - ssh ubuntu@3.7.123.18 "cd ~/Lapcare-Distribution-System && git pull origin main && docker compose -f docker-compose.prod.yml up -d --build"
