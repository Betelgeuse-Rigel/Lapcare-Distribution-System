version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: b2b_distributor_db
    restart: always
    environment:
      POSTGRES_DB: b2b_distributor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: b2b_distributor_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: b2b_distributor
      DB_USER: postgres
      DB_PASSWORD: password123
      PORT: 5000
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      MSG91_TEMPLATE_ID: ${MSG91_TEMPLATE_ID:-}
    ports:
      - "5001:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: b2b_distributor_frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  pgdata:
